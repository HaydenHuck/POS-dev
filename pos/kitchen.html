<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Orders</title>
    <link rel="stylesheet" href="kitchen.css">
</head>
<body>

    <header>
        <h1>Kitchen Orders</h1>
        <p>Incoming customer orders</p>
        <p id="kitchenMessage" class="screen-message" role="status"></p>
    </header>

    <main class="kitchen-board">
        <section>
            <h2>New Orders</h2>
            <div id="newOrders" class="orders-grid"></div>
        </section>

        <section>
            <h2>In Progress</h2>
            <div id="inProgressOrders" class="orders-grid"></div>
        </section>

        <section>
            <h2>Ready</h2>
            <div id="readyOrders" class="orders-grid"></div>
        </section>

        <section>
            <h2>Completed Orders</h2>
            <div id="completedOrders" class="orders-grid"></div>
        </section>
    </main>

    <script src="kitchen.js"></script>
</body>
</html>
